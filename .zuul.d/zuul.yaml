
- project:
    templates:
      - docs-on-readthedocs
    vars:
      rtd_webhook_id: "52691"
    check: &queue
      jobs:
        - rally-tox-cover
        - rally-tox-docs
        - rally-tox-mypy
        - rally-tox-pep8
        - rally-tox-py310
        - rally-tox-py311
        - rally-tox-py312
        - rally-tox-py313
        - rally-tox-zuul-ansible-lint:
            files:
              - tests/ci/playbooks/*
        - rally-tox-samples
        - rally-tox-functional
        - rally-tox-self
        - rally-install-ubuntu-jammy
        - rally-install-ubuntu-noble
        - rally-docker-build
        # ensure rally-openstack is working with latest rally
        - rally-task-simple-job:
            files:
              - rally/cli/commands/task.py
              - rally/common/*
              - rally/plugins/common/*
              - rally/plugins/task/*
              - rally/task/*
              - rally/utils/*
              - rally/apy.py
              - .zuul.d/*
              - tests/ci/playbooks/*
            vars:
              rally_task: "{{ ansible_user_dir }}/{{ zuul.projects['opendev.org/openstack/rally-openstack'].src_dir }}/rally-jobs/simple-job.yaml"
        - rally-verify-tempest:
            files:
              - rally/cli/commands/verify.py
              - rally/common/*
              - rally/plugins/common/*
              - rally/plugins/verification/*
              - rally/utils/*
              - rally/verification/*
              - rally/apy.py
              - .zuul.d/*
              - tests/ci/playbooks/*
    gate: *queue
    post:
      jobs:
        - rally-docker-build-and-push:
            vars:
              docker_image_version: latest
    release:
      jobs:
        - rally-docker-build-and-push
